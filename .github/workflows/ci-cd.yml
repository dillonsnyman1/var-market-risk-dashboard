name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  PROJECT_NAME: var-market-risk-dashboard

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

  reference-python:
    name: Reference (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install pytest numpy pandas scipy

      - run: pytest test_var.py -v
        working-directory: reference/python

  reference-cpp:
    name: Reference (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          cmake -B build .
          cmake --build build
          cd build && ctest --output-on-failure
        working-directory: reference/cpp

  reference-r:
    name: Reference (R)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies and run tests
        working-directory: reference/r
        run: |
          Rscript -e "install.packages('testthat')"
          Rscript test_var.R

  deploy:
    name: Deploy
    needs: [backend-test, frontend-build, reference-python, reference-cpp, reference-r]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform apply (ECR repository only)
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.backend \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "project_name=${{ env.PROJECT_NAME }}" \
            -var "lambda_image_tag=${{ github.sha }}"

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:latest

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "project_name=${{ env.PROJECT_NAME }}" \
            -var "lambda_image_tag=${{ github.sha }}"

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "api_url=$(terraform output -raw api_gateway_invoke_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_url=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ steps.tf-outputs.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist "s3://${{ steps.tf-outputs.outputs.frontend_bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-outputs.outputs.cloudfront_id }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "Deployed dashboard: ${{ steps.tf-outputs.outputs.cloudfront_url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Update README with live demo URL
        env:
          CLOUDFRONT_URL: ${{ steps.tf-outputs.outputs.cloudfront_url }}
        run: |
          python3 - <<'EOF'
          import os, re

          url = os.environ["CLOUDFRONT_URL"]
          domain = url.removeprefix("https://")
          with open("README.md") as f:
              content = f.read()

          new_block = (
              f"> **Live demo**: [{domain}]({url}) - try loading different "
              "tickers, uploading a CSV, or exploring the backtesting and "
              "Monte Carlo tabs.\n"
              ">\n"
              "> The backend is fully stateless: all VaR computation is done "
              "in-request with no database or storage of any kind."
          )
          content = re.sub(r"> \*\*Live demo\*\*:.*?(?=\n\n)", new_block, content, flags=re.S)

          with open("README.md", "w") as f:
              f.write(content)
          EOF

      - name: Commit README update
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update live demo URL in README"
            git pull --rebase --autostash origin main
            git push
          fi
