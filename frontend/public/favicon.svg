<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#2563eb"/>
  <!-- normal distribution curve - the core of VaR -->
  <path d="M5 24 Q10 24 12 18 Q14 8 16 8 Q18 8 20 18 Q22 24 27 24"
        fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- VaR tail cutoff line -->
  <line x1="10" y1="6" x2="10" y2="26" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <!-- shaded tail region (left of VaR threshold) -->
  <path d="M5 24 Q8 24 10 21 L10 24 Z" fill="#fff" opacity="0.35"/>
</svg>
